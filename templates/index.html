<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정부 지원사업 공고 매칭</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }

    .hero {
      background: linear-gradient(135deg, #1a56db 0%, #0d3b8e 100%);
      color: #fff;
      padding: 2.5rem 0 2rem;
    }
    .hero h1 { font-size: 1.75rem; font-weight: 700; }
    .hero p { opacity: .85; font-size: .95rem; }

    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }

    #file-label {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .4rem;
      border: 2px dashed #ced4da; border-radius: 8px;
      padding: 1.4rem; cursor: pointer; transition: border-color .2s, background .2s;
      color: #6c757d; font-size: .9rem;
    }
    #file-label:hover, #file-label.drag-over {
      border-color: #1a56db; background: #eef3ff; color: #1a56db;
    }
    #file-label i { font-size: 1.6rem; }
    #file-name { font-size: .82rem; color: #495057; margin-top: .2rem; }

    #analyze-btn {
      background: linear-gradient(135deg, #1a56db, #0d3b8e);
      border: none; border-radius: 8px;
      padding: .65rem 2rem; font-size: 1rem; font-weight: 600;
      transition: opacity .2s;
    }
    #analyze-btn:hover { opacity: .88; }
    #analyze-btn:disabled { opacity: .6; }

    /* 로딩 */
    #loading-section { display: none; }
    .spinner-ring {
      width: 48px; height: 48px;
      border: 4px solid #dee2e6; border-top-color: #1a56db;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-step { font-size: .88rem; color: #6c757d; }
    .loading-step.active { color: #1a56db; font-weight: 600; }
    .loading-step.done { color: #198754; }
    .loading-step .bi { margin-right: .3rem; }

    /* 결과 */
    #results-section { display: none; }

    .rank-badge {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1rem; flex-shrink: 0;
    }
    .rank-1 { background: #fff3cd; color: #856404; }
    .rank-2 { background: #e2e8f0; color: #475569; }
    .rank-3 { background: #fde8d8; color: #9a3412; }
    .rank-other { background: #f1f5f9; color: #64748b; }

    .result-card { border-left: 4px solid #1a56db !important; transition: transform .15s; }
    .result-card:hover { transform: translateY(-2px); }

    .source-badge {
      font-size: .75rem; background: #eef3ff; color: #1a56db;
      padding: .2rem .6rem; border-radius: 20px; font-weight: 600;
    }
    .reason-text { font-size: .9rem; line-height: 1.65; color: #495057; }

    .stats-bar {
      background: #fff; border-radius: 8px;
      padding: .6rem 1rem; font-size: .82rem; color: #6c757d;
    }
    .stats-bar .badge { font-size: .75rem; }

    #error-section { display: none; }
  </style>
</head>
<body>

<!-- Hero -->
<div class="hero mb-4">
  <div class="container">
    <h1><i class="bi bi-search me-2"></i>정부 지원사업 공고 매칭</h1>
    <p class="mb-0">사업 내용을 입력하면 Claude AI가 기업마당·소상공인24에서 적합한 공고를 추천합니다.</p>
  </div>
</div>

<div class="container pb-5" style="max-width:780px">

  <!-- 입력 폼 -->
  <div class="card mb-4" id="form-section">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-pencil-square me-2 text-primary"></i>사업 설명 입력</h5>

      <div class="mb-3">
        <label class="form-label fw-semibold">사업 내용 <span class="text-muted fw-normal">(자유 입력)</span></label>
        <textarea id="purpose" class="form-control" rows="5"
          placeholder="예) 미니홈피쿠폰샵 - 소상공인 매장 전용 홍보페이지와 쿠폰 자동발급 서비스. 소상공인 디지털전환 실증사업 공급기업으로 등록하고 싶음"></textarea>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">파일 첨부 <span class="text-muted fw-normal">(txt / md / pdf · 선택)</span></label>
        <label id="file-label" for="file-input">
          <i class="bi bi-cloud-upload"></i>
          <span>클릭하거나 파일을 여기에 드래그하세요</span>
          <span id="file-name"></span>
        </label>
        <input type="file" id="file-input" accept=".txt,.md,.pdf" class="d-none">
      </div>

      <div class="d-grid">
        <button id="analyze-btn" class="btn btn-primary text-white" onclick="runAnalysis()">
          <i class="bi bi-lightning-fill me-1"></i> 공고 찾기
        </button>
      </div>
    </div>
  </div>

  <!-- 에러 -->
  <div id="error-section" class="alert alert-danger d-flex align-items-center gap-2 mb-4" role="alert">
    <i class="bi bi-exclamation-triangle-fill fs-5"></i>
    <span id="error-message"></span>
  </div>

  <!-- 로딩 -->
  <div id="loading-section" class="card mb-4">
    <div class="card-body p-4 text-center">
      <div class="spinner-ring mx-auto mb-3"></div>
      <p class="fw-semibold mb-3">공고를 수집하고 분석 중입니다…</p>
      <div id="steps" class="d-flex flex-column gap-1 text-start d-inline-flex">
        <div class="loading-step active" id="step-1"><i class="bi bi-arrow-right-circle"></i>기업마당 · 소상공인24 공고 수집 중</div>
        <div class="loading-step"        id="step-2"><i class="bi bi-circle"></i>지역 한정 공고 필터링</div>
        <div class="loading-step"        id="step-3"><i class="bi bi-circle"></i>중복 공고 제거</div>
        <div class="loading-step"        id="step-4"><i class="bi bi-circle"></i>Claude AI 분석 중 (30~60초 소요)</div>
        <div class="loading-step"        id="step-5"><i class="bi bi-circle"></i>Google Sheets 저장</div>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div id="results-section">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="fw-bold mb-0"><i class="bi bi-trophy me-2 text-warning"></i>매칭 결과</h5>
      <div class="stats-bar d-flex gap-3">
        <span>수집 <strong id="stat-total">-</strong>건</span>
        <span>신규 분석 <strong id="stat-new">-</strong>건</span>
        <span id="stat-sheets" class="badge bg-success">Sheets 저장됨</span>
      </div>
    </div>
    <div id="results-list"></div>
    <div class="text-center mt-3">
      <button class="btn btn-outline-secondary btn-sm" onclick="resetForm()">
        <i class="bi bi-arrow-counterclockwise me-1"></i>다시 검색
      </button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 파일 업로드
  const fileInput = document.getElementById('file-input');
  const fileLabel = document.getElementById('file-label');
  const fileName  = document.getElementById('file-name');

  fileInput.addEventListener('change', () => {
    fileName.textContent = fileInput.files[0]?.name || '';
  });

  fileLabel.addEventListener('dragover', e => { e.preventDefault(); fileLabel.classList.add('drag-over'); });
  fileLabel.addEventListener('dragleave', () => fileLabel.classList.remove('drag-over'));
  fileLabel.addEventListener('drop', e => {
    e.preventDefault();
    fileLabel.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) {
      fileInput.files = e.dataTransfer.files;
      fileName.textContent = e.dataTransfer.files[0].name;
    }
  });

  // 로딩 스텝 시퀀스
  const STEP_DELAYS = [0, 3000, 6000, 9000, null]; // null = 서버 응답 후 처리
  let stepTimers = [];

  function advanceSteps() {
    stepTimers = [];
    for (let i = 1; i <= 4; i++) {
      const delay = STEP_DELAYS[i - 1];
      if (delay === null) continue;
      const t = setTimeout(() => setStep(i), delay);
      stepTimers.push(t);
    }
  }

  function setStep(n) {
    for (let i = 1; i <= 5; i++) {
      const el = document.getElementById('step-' + i);
      const icon = el.querySelector('.bi');
      if (i < n) {
        el.className = 'loading-step done';
        icon.className = 'bi bi-check-circle-fill';
      } else if (i === n) {
        el.className = 'loading-step active';
        icon.className = 'bi bi-arrow-right-circle';
      } else {
        el.className = 'loading-step';
        icon.className = 'bi bi-circle';
      }
    }
  }

  function clearStepTimers() { stepTimers.forEach(clearTimeout); }

  // 메인 분석 실행
  async function runAnalysis() {
    const purpose = document.getElementById('purpose').value.trim();
    const file    = fileInput.files[0];

    if (!purpose && !file) {
      showError('사업 설명을 입력하거나 파일을 업로드해주세요.');
      return;
    }

    // UI 전환
    hideError();
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('results-section').style.display = 'none';
    document.getElementById('loading-section').style.display = 'block';
    document.getElementById('analyze-btn').disabled = true;
    setStep(1);
    advanceSteps();

    const formData = new FormData();
    formData.append('purpose', purpose);
    if (file) formData.append('file', file);

    try {
      const res = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await res.json();

      clearStepTimers();

      if (!res.ok) {
        showError(data.error || '서버 오류가 발생했습니다.');
        document.getElementById('loading-section').style.display = 'none';
        document.getElementById('form-section').style.display = 'block';
        return;
      }

      setStep(5);
      setTimeout(() => showResults(data), 500);

    } catch (err) {
      clearStepTimers();
      showError('요청 중 오류가 발생했습니다: ' + err.message);
      document.getElementById('loading-section').style.display = 'none';
      document.getElementById('form-section').style.display = 'block';
    } finally {
      document.getElementById('analyze-btn').disabled = false;
    }
  }

  function showResults(data) {
    document.getElementById('loading-section').style.display = 'none';
    document.getElementById('results-section').style.display = 'block';

    const stats = data.stats || {};
    document.getElementById('stat-total').textContent = stats.total ?? '-';
    document.getElementById('stat-new').textContent   = stats.new   ?? '-';
    const sheetsBadge = document.getElementById('stat-sheets');
    sheetsBadge.style.display = data.sheets_saved ? '' : 'none';

    const list = document.getElementById('results-list');
    list.innerHTML = '';

    if (!data.results || data.results.length === 0) {
      list.innerHTML = `<div class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>${data.message || '매칭된 공고가 없습니다.'}
      </div>`;
      return;
    }

    data.results.forEach((r, idx) => {
      const rank = parseInt(r.rank) || (idx + 1);
      const badgeClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
      const linkBtn = r.link
        ? `<a href="${escHtml(r.link)}" target="_blank" class="btn btn-sm btn-outline-primary mt-2">
             <i class="bi bi-box-arrow-up-right me-1"></i>공고 바로가기
           </a>`
        : '';
      list.innerHTML += `
        <div class="card result-card mb-3">
          <div class="card-body p-4">
            <div class="d-flex gap-3 align-items-start">
              <div class="rank-badge ${badgeClass}">${rank}</div>
              <div class="flex-grow-1">
                <div class="d-flex flex-wrap gap-2 align-items-center mb-1">
                  <span class="source-badge"><i class="bi bi-building me-1"></i>${escHtml(r.source)}</span>
                </div>
                <h6 class="fw-bold mb-2">${escHtml(r.title)}</h6>
                <p class="reason-text mb-0">${escHtml(r.reason)}</p>
                ${linkBtn}
              </div>
            </div>
          </div>
        </div>`;
    });
  }

  function resetForm() {
    document.getElementById('results-section').style.display = 'none';
    document.getElementById('form-section').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('error-message').textContent = msg;
    document.getElementById('error-section').style.display = 'flex';
  }
  function hideError() {
    document.getElementById('error-section').style.display = 'none';
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 엔터키로 제출
  document.getElementById('purpose').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) runAnalysis();
  });
</script>
</body>
</html>
